<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bualuang CSR — Live Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B3664;
    --navy-dark:#122444;
    --navy-light:#3D5A8A;
    --red:#CC1F36;
    --red-dark:#A5182B;
    --gray-bg:#F2F3F5;
    --gray-line:#E3E6EB;
    --text:#1F2937;
    --text-soft:#6B7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}
  body{
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--gray-bg);
    color:var(--text);
    min-height:100vh;
    display:flex;justify-content:center;
  }
  .page-wrap{
    width:100%;max-width:1500px;
    display:flex;flex-direction:column;
    padding:12px 14px 10px;
    min-height:100vh;
  }

  /* Header */
  .header{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;
    gap:8px 12px;margin-bottom:10px;flex-shrink:0;
  }
  .header-left{display:flex;align-items:center;gap:clamp(10px,2vw,16px);min-width:0;}
  .header-left img{height:clamp(40px,7vw,68px);width:auto;flex-shrink:0;}
  .event-eyebrow{
    font-size:clamp(9px,1.6vw,13px);font-weight:800;letter-spacing:1.6px;text-transform:uppercase;
    color:var(--red);margin-bottom:3px;white-space:nowrap;
  }
  .event-title{font-size:clamp(18px,4vw,32px);font-weight:900;letter-spacing:-0.4px;color:var(--navy);line-height:1.1;}
  .header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:auto;}
  .live-badge{
    display:flex;align-items:center;gap:6px;background:#fff;
    border:1.5px solid var(--red);border-radius:18px;padding:5px 13px;
    font-size:10.5px;font-weight:800;color:var(--red);letter-spacing:1px;text-transform:uppercase;
    box-shadow:0 1px 6px rgba(0,0,0,0.05);white-space:nowrap;
  }
  .live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.35;transform:scale(0.8);}}

  .lang-toggle{
    display:flex;align-items:center;gap:5px;
    background:var(--navy);color:#fff;border:none;border-radius:18px;
    padding:8px 14px;font-size:12px;font-weight:800;letter-spacing:0.3px;
    cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,0.08);white-space:nowrap;
  }
  .lang-toggle:active{background:var(--navy-dark);}
  .lang-seg{opacity:0.4;transition:opacity 0.15s;}
  .lang-seg.active{opacity:1;}
  .lang-sep{opacity:0.3;font-weight:400;}

  /* Total banner */
  .total-banner{
    background:linear-gradient(120deg,var(--navy) 0%,var(--navy-dark) 100%);
    border-radius:18px;
    padding:clamp(14px,2.5vw,20px) clamp(16px,3.5vw,30px);
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;
    gap:10px 16px;
    margin-bottom:12px;
    position:relative;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(27,54,100,0.25);
    flex-shrink:0;
  }
  .total-banner::after{
    content:'';position:absolute;top:-50%;right:-4%;width:220px;height:220px;
    background:radial-gradient(circle, rgba(204,31,54,0.35) 0%, transparent 70%);
    border-radius:50%;
  }
  .tb-left{position:relative;z-index:1;flex-shrink:0;}
  .total-label{font-size:clamp(9.5px,1.5vw,11px);font-weight:800;letter-spacing:2.2px;text-transform:uppercase;color:#f0a8b0;margin-bottom:4px;}
  .total-amount{font-size:clamp(34px,7vw,60px);font-weight:900;letter-spacing:-2px;line-height:1;color:#fff;}

  /* Live donation feed — replaces the old donor-count stat */
  .tb-feed{
    flex:1 1 160px;position:relative;z-index:1;
    padding:0 4px;min-width:120px;
    display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px;
    order:2;
  }
  .feed-line{
    font-size:clamp(11.5px,1.6vw,14px);color:rgba(255,255,255,0.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    text-align:right;max-width:100%;
  }
  .feed-line.feed-in{animation:feedIn 0.45s cubic-bezier(.22,.68,0,1.15);}
  .feed-line.feed-out{animation:feedOut 0.4s ease forwards;}
  .feed-line b{color:#fff;font-weight:800;}
  .feed-line .fd{color:#f0c84a;font-weight:700;}
  .feed-line .fa{color:#fff;font-weight:900;}
  @keyframes feedIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes feedOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-8px);}}
  .feed-empty{font-size:clamp(11px,1.5vw,13px);color:rgba(255,255,255,0.4);font-style:italic;text-align:right;}

  .tb-mascot{
    position:relative;z-index:1;height:clamp(46px,7vw,78px);width:auto;flex-shrink:0;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,0.25));order:3;
  }

  /* Grid layout — mobile-first: horizontal swipe carousel between the two cards */
  .grid{
    display:flex;
    gap:14px;
    flex:1;
    min-height:0;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    margin:0 -14px;
    padding:0 14px;
  }
  .grid::-webkit-scrollbar{display:none;}
  .card{
    background:#fff;
    border-radius:16px;
    padding:14px 16px 12px;
    box-shadow:0 2px 14px rgba(0,0,0,0.06);
    display:flex;flex-direction:column;
    min-height:0;
    flex:0 0 100%;
    scroll-snap-align:center;
    min-width:0;
  }

  /* Swipe page dots — mobile only */
  .swipe-dots{
    display:flex;justify-content:center;gap:6px;margin:8px 0 2px;flex-shrink:0;
  }
  .swipe-dot{width:6px;height:6px;border-radius:50%;background:var(--gray-line);transition:background 0.2s,width 0.2s;}
  .swipe-dot.active{background:var(--navy);width:18px;border-radius:4px;}
  .swipe-hint{text-align:center;font-size:10px;color:var(--text-soft);margin-bottom:2px;flex-shrink:0;}

  /* ═══ Tablet landscape / small desktop and up: side-by-side, no swipe ═══ */
  @media (min-width:760px) and (min-height:480px){
    body{overflow-y:hidden;height:100vh;}
    .page-wrap{height:100vh;padding:16px 24px 12px;}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      overflow:visible;
      margin:0;padding:0;
    }
    .card{flex:initial;scroll-snap-align:none;}
    .swipe-dots,.swipe-hint{display:none;}
    .tb-feed{order:0;}
    .tb-mascot{order:0;}
  }

  /* ═══ Desktop: extra breathing room ═══ */
  @media (min-width:1200px){
    .page-wrap{padding:22px 32px 16px;}
    .grid{gap:20px;}
    .card{padding:20px 24px 18px;}
  }
  .card-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:6px;padding-bottom:8px;border-bottom:2px solid var(--gray-line);
    flex-shrink:0;
  }
  .card-title{font-size:clamp(12px,2.2vw,13px);font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:0.6px;display:flex;align-items:center;gap:6px;}
  .card-title .count-badge{
    background:var(--gray-bg);color:var(--text-soft);font-size:11px;font-weight:800;
    padding:1px 8px;border-radius:10px;text-transform:none;letter-spacing:0;
  }
  .card-sub{font-size:10.5px;color:var(--text-soft);font-weight:600;}

  /* Search */
  .search-toggle-btn{
    background:var(--gray-bg);border:none;border-radius:8px;
    width:26px;height:26px;font-size:13px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .search-toggle-btn.active{background:var(--navy);color:#fff;}
  .search-bar{
    display:none;gap:8px;margin:0 0 8px;flex-shrink:0;
  }
  .search-bar.open{display:flex;}
  .search-bar input{
    flex:1;padding:8px 12px;border:1.5px solid var(--gray-line);border-radius:8px;
    font-size:13px;background:#fafafa;color:var(--text);
  }
  .search-bar input:focus{outline:none;border-color:var(--navy);background:#fff;}
  .search-clear-btn{
    background:var(--gray-bg);border:none;border-radius:8px;width:34px;
    font-size:13px;color:var(--text-soft);cursor:pointer;
  }
  .hl{background:#fde68a;color:var(--text);border-radius:3px;padding:0 1px;}
  .search-rank{
    font-size:11px;font-weight:800;color:var(--navy);background:var(--gray-bg);
    border-radius:8px;padding:2px 6px;text-align:center;
  }

  /* Show more / pagination */
  .show-more-btn{
    display:block;width:100%;margin-top:6px;padding:9px;
    background:var(--gray-bg);border:none;border-radius:10px;
    font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;flex-shrink:0;
  }
  .pagination-controls{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-line);flex-shrink:0;
  }
  .page-nav-group{display:flex;align-items:center;gap:8px;}
  .page-nav-btn{
    background:var(--gray-bg);border:none;border-radius:8px;padding:6px 10px;
    font-size:11px;font-weight:700;color:var(--navy);cursor:pointer;
  }
  .page-nav-btn:disabled{opacity:0.35;cursor:default;}
  .page-indicator{font-size:11px;font-weight:700;color:var(--text-soft);}

  .card-body{flex:1;min-height:0;overflow-y:auto;scrollbar-width:none;}
  .card-body::-webkit-scrollbar{display:none;}

  /* Division leaderboard rows */
  .div-row{
    display:grid;grid-template-columns:20px 82px 1fr 92px;
    gap:8px;align-items:center;padding:5px 2px;
    border-bottom:1px solid #f3f4f6;
  }
  .div-row:last-child{border-bottom:none;}
  .div-rank{font-size:11px;font-weight:800;color:#c1c6ce;text-align:center;}
  .div-name{font-size:clamp(11px,2vw,12px);font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .div-bar-bg{background:#f0f1f3;border-radius:5px;height:8px;overflow:hidden;}
  .div-bar-fill{height:100%;border-radius:5px;transition:width 0.8s cubic-bezier(.22,.68,0,1.1);}
  .div-amount{font-size:clamp(13px,2.4vw,15px);font-weight:900;color:var(--navy);text-align:right;letter-spacing:-0.3px;}

  /* Individual leaderboard rows */
  .ind-row{
    display:flex;align-items:center;gap:10px;padding:6px 4px;
    border-bottom:1px solid #f3f4f6;
    animation:rowIn 0.4s cubic-bezier(.22,.68,0,1.15);
  }
  .ind-row:last-child{border-bottom:none;}
  @keyframes rowIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
  .ind-rank{
    width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;color:#9ca3af;background:#f3f4f6;flex-shrink:0;
  }
  .ind-rank.r1{background:linear-gradient(135deg,#f0c84a,#c9a227);color:#fff;}
  .ind-rank.r2{background:linear-gradient(135deg,#d6d9de,#aeb4bd);color:#fff;}
  .ind-rank.r3{background:linear-gradient(135deg,#d99a5c,#b8763a);color:#fff;}
  .ind-info{flex:1;min-width:0;}
  .ind-name{font-size:clamp(12px,2.2vw,13px);font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ind-div{font-size:11.5px;color:var(--text-soft);font-weight:500;}
  .ind-amount{font-size:clamp(14px,2.6vw,17px);font-weight:900;color:var(--red);flex-shrink:0;letter-spacing:-0.3px;}

  .empty-state{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#c1c6ce;font-size:13px;gap:8px;padding:20px 0;
  }
  .empty-state .icon{font-size:28px;}

  footer{margin-top:8px;text-align:center;font-size:9.5px;color:#b5bac2;letter-spacing:1px;font-weight:600;flex-shrink:0;}
</style>
</head>

const CUSTOM_DIV_PALETTE = ['#4A6FA5','#B33951','#5C7A99','#C4536B','#3D5A80','#9E2A2B','#6B4E71','#2E6171'];
function divColor(d){
  if (DIV_COLORS[d]) return DIV_COLORS[d];
  let hash = 0;
  for (let i = 0; i < d.length; i++) hash = (hash * 31 + d.charCodeAt(i)) >>> 0;
  return CUSTOM_DIV_PALETTE[hash % CUSTOM_DIV_PALETTE.length];
}
function rankClass(i){ return ['r1','r2','r3'][i] || ''; }
function rankSymbol(i){ return ['🥇','🥈','🥉'][i] || (i+1); }

let currentLang = localStorage.getItem('bls_csr_lang') || 'en';

/* ─── Top Donors: search + pagination state ─── */
let allPeople = [];        // full sorted donor list, refreshed on each data change
let searchOpen = false;
let searchQuery = '';
let fullListMode = false;
let currentPage = 1;
const TOP_N = 30;

/* ─── Live donation feed — animated 3-item queue ─── */
let feedItems = [];
let feedLang = null;
let lastRawEntries = [];

function findFeedEl(feedEl, id) {
  return [...feedEl.children].find(el => el.dataset.id === id) || null;
}

function renderFeed(entries) {
  const feedEl = document.getElementById('feedList');
  const dict = I18N[currentLang];

  const latest = [...entries].sort((a,b) => b.timestamp - a.timestamp).slice(0, 3)
    .map(e => ({ id: e.timestamp + '_' + e.name + '_' + e.amount, ...e }));

  const oldIds = feedItems.map(i => i.id);
  const newIds = latest.map(i => i.id);
  const dataUnchanged = oldIds.join('|') === newIds.join('|');
  const langUnchanged = feedLang === currentLang;

  if (dataUnchanged && langUnchanged) return; // nothing to do

  if (!latest.length) {
    feedEl.innerHTML = `<div class="feed-empty">${dict.feedEmpty}</div>`;
    feedItems = [];
    feedLang = currentLang;
    return;
  }

  const emptyEl = feedEl.querySelector('.feed-empty');
  if (emptyEl) emptyEl.remove();

  if (dataUnchanged && !langUnchanged) {
    // Only the language changed — refresh text in place, no animation
    latest.forEach(item => {
      const el = findFeedEl(feedEl, item.id);
      if (el) el.innerHTML = dict.donated(item.name, item.division, item.amount.toLocaleString('en-US'));
    });
    feedLang = currentLang;
    return;
  }

  // Data changed — fade out dropped items, fade in new ones, keep others untouched
  oldIds.forEach(id => {
    if (!newIds.includes(id)) {
      const el = findFeedEl(feedEl, id);
      if (el) {
        el.classList.remove('feed-in');
        el.classList.add('feed-out');
        setTimeout(() => el.remove(), 420);
      }
    }
  });

  for (let i = latest.length - 1; i >= 0; i--) {
    const item = latest[i];
    if (!oldIds.includes(item.id)) {
      const el = document.createElement('div');
      el.className = 'feed-line feed-in';
      el.dataset.id = item.id;
      el.innerHTML = dict.donated(item.name, item.division, item.amount.toLocaleString('en-US'));
      feedEl.insertBefore(el, feedEl.firstChild);
    }
  }

  feedItems = latest;
  feedLang = currentLang;
}
const PAGE_SIZE = 50;

function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('searchBar').classList.toggle('open', searchOpen);
  document.getElementById('searchToggleBtn').classList.toggle('active', searchOpen);
  if (searchOpen) {
    document.getElementById('donorSearchInput').focus();
  } else {
    closeSearch();
  }
}
function closeSearch() {
  searchOpen = false;
  searchQuery = '';
  document.getElementById('donorSearchInput').value = '';
  document.getElementById('searchBar').classList.remove('open');
  document.getElementById('searchToggleBtn').classList.remove('active');
  renderDonorList();
}
function onSearchInput() {
  searchQuery = document.getElementById('donorSearchInput').value.trim().toLowerCase();
  renderDonorList();
}
function expandFullList() { fullListMode = true; currentPage = 1; renderDonorList(); }
function collapseList()   { fullListMode = false; currentPage = 1; renderDonorList(); }
function nextPage() {
  const totalPages = Math.max(1, Math.ceil(allPeople.length / PAGE_SIZE));
  if (currentPage < totalPages) { currentPage++; renderDonorList(); }
}
function prevPage() {
  if (currentPage > 1) { currentPage--; renderDonorList(); }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlightMatch(name, query) {
  const safe = escapeHtml(name);
  if (!query) return safe;
  const idx = safe.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return safe;
  return safe.slice(0, idx) + '<mark class="hl">' + safe.slice(idx, idx + query.length) + '</mark>' + safe.slice(idx + query.length);
}

function donorRowHtml(p, rankIndex) {
  return `
    <div class="ind-row">
      <div class="ind-rank ${rankClass(rankIndex)}">${rankSymbol(rankIndex)}</div>
      <div class="ind-info">
        <div class="ind-name">${escapeHtml(p.name)} <span style="color:${divColor(p.division)};font-weight:700;">(${escapeHtml(p.division)})</span></div>
      </div>
      <div class="ind-amount">฿${p.amount.toLocaleString('en-US')}</div>
    </div>
  `;
}

function renderDonorList() {
  const dict = I18N[currentLang];
  const indListEl = document.getElementById('indList');
  const showMoreBtn = document.getElementById('showMoreBtn');
  const paginationEl = document.getElementById('paginationControls');

  if (!allPeople.length) {
    indListEl.innerHTML = `<div class="empty-state"><div class="icon">🎗️</div><div>${dict.waiting}</div></div>`;
    showMoreBtn.style.display = 'none';
    paginationEl.style.display = 'none';
    return;
  }

  // Search mode — looks across ALL donors, not just the visible top N
  if (searchQuery) {
    showMoreBtn.style.display = 'none';
    paginationEl.style.display = 'none';
    const results = allPeople
      .map((p, i) => ({ ...p, rank: i + 1 }))
      .filter(p => p.name.toLowerCase().includes(searchQuery));

    if (!results.length) {
      indListEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>${dict.noResults}</div></div>`;
      return;
    }
    indListEl.innerHTML = results.map(p => `
      <div class="ind-row">
        <div class="search-rank">#${p.rank}</div>
        <div class="ind-info">
          <div class="ind-name">${highlightMatch(p.name, searchQuery)} <span style="color:${divColor(p.division)};font-weight:700;">(${escapeHtml(p.division)})</span></div>
        </div>
        <div class="ind-amount">฿${p.amount.toLocaleString('en-US')}</div>
      </div>
    `).join('');
    return;
  }

  // Full list mode — paginated, 50 per page
  if (fullListMode) {
    const totalPages = Math.max(1, Math.ceil(allPeople.length / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;
    const startIdx = (currentPage - 1) * PAGE_SIZE;
    const pageItems = allPeople.slice(startIdx, startIdx + PAGE_SIZE);

    indListEl.innerHTML = pageItems.map((p, i) => donorRowHtml(p, startIdx + i)).join('');
    showMoreBtn.style.display = 'none';
    paginationEl.style.display = 'flex';
    document.getElementById('pageIndicator').textContent = dict.pageIndicator(currentPage, totalPages);
    document.getElementById('prevPageBtn').disabled = currentPage === 1;
    document.getElementById('nextPageBtn').disabled = currentPage === totalPages;
    return;
  }

  // Default view — Top 30
  const topItems = allPeople.slice(0, TOP_N);
  indListEl.innerHTML = topItems.map((p, i) => donorRowHtml(p, i)).join('');
  showMoreBtn.style.display = allPeople.length > TOP_N ? 'block' : 'none';
  paginationEl.style.display = 'none';
}

function applyStaticTranslations() {
  const dict = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (dict[key] !== undefined && typeof dict[key] === 'string') el.textContent = dict[key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder;
    if (dict[key] !== undefined && typeof dict[key] === 'string') el.placeholder = dict[key];
  });
  document.getElementById('langEN').classList.toggle('active', currentLang === 'en');
  document.getElementById('langTH').classList.toggle('active', currentLang === 'th');
  document.documentElement.lang = currentLang;
  if (allPeople.length || searchQuery) renderDonorList();
  renderFeed(lastRawEntries);
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'th' : 'en';
  localStorage.setItem('bls_csr_lang', currentLang);
  applyStaticTranslations();
  lastDataHash = null; // force re-render of dynamic content in the new language
  fetchAndRender();
}
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmElzn7xCgNu2vlEZ3AihNMmNsAhAm3ps",
  authDomain: "bls-csr-2026.firebaseapp.com",
  databaseURL: "https://bls-csr-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bls-csr-2026",
  storageBucket: "bls-csr-2026.firebasestorage.app",
  messagingSenderId: "478647949590",
  appId: "1:478647949590:web:0deba8bd908ad587b75837"
};
// ══════════════════════════════════════════════════

let lastDataHash = null;

function handleSnapshot(entries) {
  // Skip re-render entirely if nothing actually changed — this is what stops the flicker
  const hash = JSON.stringify(entries) + '|' + currentLang;
  if (hash === lastDataHash) return;
  lastDataHash = hash;
  lastRawEntries = entries;

  const dict = I18N[currentLang];
  console.log('[BLS CSR] Data changed —', entries.length, 'entries:', entries);

  let total = 0;
  const byPerson = {};
  const byDiv = {};

  entries.forEach(d => {
    total += d.amount;
    const personKey = d.name + '||' + d.division;
    if (byPerson[personKey]) { byPerson[personKey].amount += d.amount; }
    else { byPerson[personKey] = { name: d.name, division: d.division, amount: d.amount }; }
    byDiv[d.division] = (byDiv[d.division] || 0) + d.amount;
  });

  const people = Object.values(byPerson).sort((a,b) => b.amount - a.amount);
  const divisions = Object.entries(byDiv).map(([name,amount]) => ({name,amount})).sort((a,b) => b.amount - a.amount);
  const maxDiv = divisions[0]?.amount || 1;

  document.getElementById('totalAmount').textContent = '฿' + total.toLocaleString('en-US');
  document.getElementById('divCardSub').textContent  = dict.activeDivisions(divisions.length);
  document.getElementById('topDonorsCount').textContent = people.length ? '(' + people.length + ')' : '';

  /* Live donation feed — animated enter/exit, handled by renderFeed() */
  renderFeed(entries);

  /* Division leaderboard */
  const divListEl = document.getElementById('divList');
  if (!divisions.length) {
    divListEl.innerHTML = `<div class="empty-state"><div class="icon">🏆</div><div>${dict.waiting}</div></div>`;
  } else {
    divListEl.innerHTML = divisions.map((d,i) => {
      const pct = Math.round((d.amount / maxDiv) * 100);
      return `
        <div class="div-row">
          <div class="div-rank">${i+1}</div>
          <div class="div-name">${d.name}</div>
          <div class="div-bar-bg"><div class="div-bar-fill" style="width:${pct}%;background:${divColor(d.name)}"></div></div>
          <div class="div-amount">฿${d.amount.toLocaleString('en-US')}</div>
        </div>
      `;
    }).join('');
  }

  /* Individual leaderboard — top 30, search, and pagination handled by renderDonorList() */
  allPeople = people;
  renderDonorList();
}

function handleReadError(err) {
  console.error('[BLS CSR] READ FAILED:', err);
  document.getElementById('totalAmount').textContent = 'ERROR';
  document.getElementById('divList').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>${err.message}</div></div>`;
}

/* ─── Direct REST fetch, cache fully disabled (bypasses any SDK-layer caching) ─── */
const REST_URL = firebaseConfig.databaseURL + '/donations.json';

async function fetchAndRender() {
  try {
    const res = await fetch(REST_URL + '?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const entries = data ? Object.values(data) : [];
    handleSnapshot(entries);
  } catch (err) {
    handleReadError(err);
  }
}

/* ─── Swipe dots (mobile carousel indicator) ─── */
function setupSwipeDots() {
  const gridEl = document.getElementById('grid');
  const dots = document.querySelectorAll('#swipeDots .swipe-dot');
  if (!gridEl || !dots.length) return;
  gridEl.addEventListener('scroll', () => {
    const idx = Math.round(gridEl.scrollLeft / gridEl.clientWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }, { passive: true });
}

applyStaticTranslations();
setupSwipeDots();
fetchAndRender();
setInterval(fetchAndRender, 2000);
</script>
